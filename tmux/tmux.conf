set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",ghostty*:Tc"

# LIST OF PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left 'C-h'
set -g @vim_navigator_mapping_down 'C-j'
set -g @vim_navigator_mapping_up 'C-k'
set -g @vim_navigator_mapping_right 'C-l'
set -g @vim_navigator_mapping_prev 'C-\\'
set -g @plugin 'catppuccin/tmux'
# Catppuccin Latte theme
set -g @catppuccin_flavor 'latte'

# change prefix from Ctrl+b to Ctrl+a (faster to press)
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### PERFORMANCE #####

# remove 500ms escape delay (tmux feels much faster)
set -sg escape-time 0


##### MOUSE #####

# enable mouse: resize panes, scroll, select panes
set -g mouse on


##### INDEXING #####

# start windows and panes from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1


##### PANE RESIZE (ALT KEYS) #####

# resize panes without prefix using Alt
bind -n M-h resize-pane -L 5
bind -n M-l resize-pane -R 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5


##### FAST SPLITS #####

# easier splits instead of % and "
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"


##### CONFIG RELOAD #####

# reload tmux config without restarting tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Catppuccin Latte theme
set -g @catppuccin_flavor 'latte'

run '~/.tmux/plugins/tpm/tpm'
run ~/.config/tmux/plugins/tmux/catppuccin.tmux
