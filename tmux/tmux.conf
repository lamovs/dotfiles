set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",ghostty*:Tc"
set -g default-shell /opt/homebrew/bin/fish

# LIST OF PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Navigation
set -g @vim_navigator_mapping_left 'C-h'
set -g @vim_navigator_mapping_down 'C-j'
set -g @vim_navigator_mapping_up 'C-k'
set -g @vim_navigator_mapping_right 'C-l'
set -g @vim_navigator_mapping_prev 'C-\\'

# Catppuccin theme
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator " "
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_current_left_separator "#[fg=#232634,bold]["
set -g @catppuccin_window_current_middle_separator ""
set -g @catppuccin_window_current_right_separator "#[fg=#232634,bold]] "
set -g @catppuccin_window_number_color "default"
set -g @catppuccin_window_text_color "default"
set -g @catppuccin_window_current_number_color "default"
set -g @catppuccin_window_current_text_color "default"
set -g @catppuccin_window_number "#[fg=#303446]#I"
set -g @catppuccin_window_text "#[fg=#303446] #W "
set -g @catppuccin_window_current_number "#[fg=#232634,bold]#I"
set -g @catppuccin_window_current_text "#[fg=#232634,bold] #W"
set -g @plugin 'catppuccin/tmux'

# change prefix from Ctrl+b to Ctrl+a (faster to press)
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### WINDOW NAMING #####

# show short directory name instead of full path
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#{pane_current_path},/Users/movsar},~,#{b:pane_current_path}}"


##### STATUS BAR #####

# Keep only the window list in the status line.
set -g status-left ""
set -g status-right ""
set -g status-right-length 0
set -g status-left-length 0
set -g status-justify centre


##### PERFORMANCE #####

# small escape delay to allow Alt key sequences (e.g. Alt+o)
set -sg escape-time 10


##### MOUSE #####

# enable mouse: resize panes, scroll, select panes
set -g mouse on


##### INDEXING #####

# start windows and panes from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1


##### PANE RESIZE (ALT KEYS) #####

# resize panes without prefix using Alt
bind -n M-h resize-pane -L 5
bind -n M-l resize-pane -R 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5


##### FAST SPLITS #####

# easier splits instead of % and "
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"


##### CONFIG RELOAD #####

# reload tmux config without restarting tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

run '~/.tmux/plugins/tpm/tpm'
