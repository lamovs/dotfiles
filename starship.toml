palette = "catppuccin_frappe"

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$nodejs\
$rust\
$java\
$golang\
$terraform\
$aws\
$gcloud\
$docker_context\
$kubernetes\
$helm\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold lavender"
truncation_length = 1
truncate_to_repo = false
read_only = " 󰌾"
format = '[󰉋 $path]($style)[$read_only]($read_only_style) '

[git_branch]
symbol = "󰘬 "
style = "bold mauve"
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
rebase = "[󰜘 REBASE](bold peach)"
merge = "[󰘭 MERGE](bold flamingo)"
cherry_pick = "[󰆏 PICK](bold red)"
revert = "[󰕍 REVERT](bold maroon)"
bisect = "[󰩫 BISECT](bold yellow)"
am = "[󰶊 AM](bold peach)"
am_or_rebase = "[󰶊 AM/REBASE](bold peach)"

[git_status]
format = '$ahead_behind$conflicted$stashed$staged$modified$renamed$deleted$untracked'
ahead = "[󰜸 ${count} ](bold green)"
behind = "[󰜯 ${count} ](bold red)"
diverged = "[󰹺 ${ahead_count}/${behind_count} ](bold peach)"
conflicted = "[󰞇 ${count} ](bold red)"
stashed = "[󰏗 ${count} ](bold sky)"
modified = "[󰏫 ${count} ](bold yellow)"
staged = "[󰐕 ${count} ](bold green)"
renamed = "[󰑕 ${count} ](bold peach)"
deleted = "[󰍷 ${count} ](bold red)"
untracked = "[󰋗 ${count} ](bold flamingo)"

[fill]
symbol = " "

[golang]
symbol = "󰟓 "
style = "bold sapphire"
format = '[$symbol$version]($style) '

[docker_context]
symbol = "󰡨 "
style = "bold blue"
format = '[$symbol$context]($style) '

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bold sky"
format = '[$symbol$context( \($namespace\))]($style) '

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "󱎫 [$duration]($style) "

[python]
symbol = "󰌠 "
style = "bold yellow"
format = '[$symbol$version( \($virtualenv\))]($style) '

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = '[$symbol$version]($style) '

[rust]
symbol = "󱘗 "
style = "bold peach"
format = '[$symbol$version]($style) '

[java]
symbol = "󰬷 "
style = "bold red"
format = '[$symbol$version]($style) '

[terraform]
symbol = "󱁢 "
style = "bold teal"
format = '[$symbol$workspace]($style) '

[aws]
symbol = "󰸏 "
style = "bold peach"
format = '[$symbol($profile )(\($region\))]($style) '

[gcloud]
symbol = "󱇶 "
style = "bold blue"
format = '[$symbol$account(@$domain)(\($project\))]($style) '

[helm]
symbol = "󰠳 "
style = "bold flamingo"
format = '[$symbol$version]($style) '

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"
